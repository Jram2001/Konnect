<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konnect — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0c;
  --surface: #141414;
  --surface-2: #1a1a1a;
  --border: #222;
  --border-h: #333;
  --accent: #c8f135;
  --accent-dim: #a8cc2a;
  --t1: #e0e0e0;
  --t2: #888;
  --t3: #555;
  --red: #e05555;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}

/* ─── container ─── */

.container {
  width: 100%;
  max-width: 440px;
}

/* ─── header ─── */

.brand {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--t3);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.title {
  font-size: 28px;
  font-weight: 700;
  color: var(--t1);
  line-height: 1.2;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 14px;
  color: var(--t2);
  line-height: 1.6;
  margin-bottom: 36px;
}

/* ─── form ─── */

.field { margin-bottom: 20px; }

.label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--t3);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.input {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--t1);
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--t3); }

textarea.input {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}

.hint {
  font-size: 12px;
  color: var(--t3);
  margin-top: 6px;
  line-height: 1.5;
}

.btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #0c0c0c;
  border: none;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  margin-top: 8px;
}

.btn:hover { background: var(--accent-dim); }
.btn:active { transform: scale(0.985); }
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ─── error view ─── */

.error-view { text-align: center; }

.error-view .error-img {
  width: 180px;
  height: auto;
  border-radius: 12px;
  margin-bottom: 24px;
  opacity: 0.9;
}

.error-view .error-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--t1);
  margin-bottom: 8px;
}

.error-view .error-msg {
  font-size: 14px;
  color: var(--t2);
  line-height: 1.6;
  margin-bottom: 28px;
}

.btn-outline {
  display: inline-block;
  padding: 12px 32px;
  background: transparent;
  color: var(--t1);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.2s;
}

.btn-outline:hover { border-color: var(--t2); }

/* ─── success view ─── */

.success-view { text-align: center; }

.check {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

.check svg { width: 24px; height: 24px; }

.success-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--t1);
  margin-bottom: 8px;
}

.success-msg {
  font-size: 14px;
  color: var(--t2);
  line-height: 1.6;
  margin-bottom: 28px;
}

.entity-list {
  text-align: left;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.entity-list-header {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--t3);
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.entity-item {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.entity-item:last-child { border-bottom: none; }

.entity-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--t1);
}

.entity-key {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--t3);
}

/* ─── spinner ─── */

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #0c0c0c;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── view toggle ─── */

.view { display: none; }
.view.active { display: block; }

/* ─── fade in ─── */

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in { animation: fadeUp 0.35s ease-out forwards; }
</style>
</head>
<body>

<div class="container">

  <!-- ═══ FORM VIEW ═══ -->
  <div id="formView" class="view active">
    <div class="brand">Konnect</div>
    <h1 class="title">Get your daily digest</h1>
    <p class="subtitle">Tell us what you care about. We'll send you a morning email with everything that matters.</p>

    <form id="signupForm" autocomplete="off">
      <div class="field">
        <label class="label" for="email">Email</label>
        <input
          class="input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
        >
      </div>

      <div class="field">
        <label class="label" for="watchlist">What do you want to track?</label>
        <textarea
          class="input"
          id="watchlist"
          name="watchlist_text"
          placeholder="e.g. Reliance, gold prices, RBI policy, Infosys"
          required
        ></textarea>
        <div class="hint">Free text. Max 5 entities. We'll figure out the rest.</div>
      </div>

      <button class="btn" type="submit" id="submitBtn">Sign up</button>
    </form>
  </div>

  <!-- ═══ ERROR VIEW ═══ -->
  <div id="errorView" class="view">
    <div class="brand">Konnect</div>
    <div class="error-view">
      <img id="errorImg" class="error-img" src="" alt="">
      <div id="errorTitle" class="error-title"></div>
      <div id="errorMsg" class="error-msg"></div>
      <button class="btn-outline" id="retryBtn">Try again</button>
    </div>
  </div>

  <!-- ═══ SUCCESS VIEW ═══ -->
  <div id="successView" class="view">
    <div class="brand">Konnect</div>
    <div class="success-view">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0c0c0c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-title">You're in</div>
      <div class="success-msg">Your first digest arrives tomorrow at 6 AM. Here's what we're tracking for you.</div>
      <div class="entity-list" id="entityList">
        <div class="entity-list-header">Your watchlist</div>
      </div>
    </div>
  </div>

</div>

<script>
const form       = document.getElementById('signupForm');
const submitBtn  = document.getElementById('submitBtn');
const retryBtn   = document.getElementById('retryBtn');
const formView   = document.getElementById('formView');
const errorView  = document.getElementById('errorView');
const successView = document.getElementById('successView');

function show(view) {
  [formView, errorView, successView].forEach(v => v.classList.remove('active'));
  view.classList.add('active', 'fade-in');
}

function showError(title, msg, img) {
  document.getElementById('errorTitle').textContent = title;
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorImg').src = img;
  show(errorView);
}

function showSuccess(watchlist) {
  const list = document.getElementById('entityList');
  // clear old items, keep header
  list.querySelectorAll('.entity-item').forEach(el => el.remove());

  watchlist.forEach(e => {
    const div = document.createElement('div');
    div.className = 'entity-item';
    div.innerHTML = `
      <span class="entity-name">${e.display_name}</span>
      <span class="entity-key">${e.entity_key}</span>
    `;
    list.appendChild(div);
  });

  show(successView);
}

retryBtn.addEventListener('click', () => {
  show(formView);
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const watchlist_text = document.getElementById('watchlist').value.trim();

  if (!email || !watchlist_text) return;

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>Working…';

  try {
    const res = await fetch('/api/users/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, watchlist_text }),
    });

    const data = await res.json();

    if (!res.ok) {
      const msg = data.error || 'Something went wrong';

      if (res.status === 503) {
        showError("We're full", msg, '/images/cat-full.gif');
      } else {
        showError('Hmm, that didn\u2019t work', msg, '/images/cat-bullshit.gif');
      }
      return;
    }

    showSuccess(data.watchlist || []);
  } catch (err) {
    showError('Hmm, that didn\u2019t work', 'Network error. Check your connection and try again.', '/images/cat-bullshit.gif');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign up';
  }
});
</script>
</body>
</html>
